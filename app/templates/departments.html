{% extends 'base.html' %}
{% block content %}
    <h1>Departments</h1>
    <a href="{{ url_for('departments.add') }}" class="btn btn-primary mb-3">Add Department</a>
    <table class="table table-bordered">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Description</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
        {% for dept in departments %}
            <tr>
                <td>{{ dept.department_id }}</td>
                <td>{{ dept.name }}</td>
                <td>{{ dept.description }}</td>
                <td>
                    <a href="{{ url_for('departments.update', department_id=dept.department_id) }}" class="btn btn-sm btn-warning">Edit</a>
                    <form action="{{ url_for('departments.delete', department_id=dept.department_id) }}" method="post" style="display:inline-block;">
                        <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Delete this department?');">Delete</button>
                    </form>
                </td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
{% endblock %}
