{% extends 'base.html' %}
{% block content %}
    <h1>{{ action }} Employee</h1>
    <form method="post">
        <div class="row">
            <div class="col-md-6">
                {% if action == 'Add' %}
                <div class="mb-3">
                    <label for="person_id" class="form-label">Person</label>
                    <select class="form-select" id="person_id" name="person_id" required>
                        <option value="">-- Select a Person --</option>
                        {% for person in persons %}
                            <option value="{{ person[0] }}">{{ person[2] }}, {{ person[1] }}</option>
                        {% endfor %}
                    </select>
                </div>
                {% else %}
                <div class="mb-3">
                    <label class="form-label">Person</label>
                    <p class="form-control-plaintext">{{ employee.person.last_name }}, {{ employee.person.first_name }}</p>
                </div>
                <div class="mb-3">
                    <label class="form-label">Personal Email</label>
                    <p class="form-control-plaintext">{{ employee.person.personal_email }}</p>
                </div>
                {% endif %}
                <div class="mb-3">
                    <label for="start_date" class="form-label">Start Date</label>
                    <input type="date" class="form-control" id="start_date" name="start_date" required value="{{ employee.start_date if employee else '' }}">
                </div>
                <div class="mb-3">
                    <label for="end_date" class="form-label">End Date</label>
                    <input type="date" class="form-control" id="end_date" name="end_date" value="{{ employee.end_date if employee else '' }}">
                </div>
            </div>
            <div class="col-md-6">
                <div class="mb-3">
                    <label for="position_id" class="form-label">Position</label>
                    <select class="form-select" id="position_id" name="position_id">
                        <option value="">-- None --</option>
                        {% for pos in positions %}
                            <option value="{{ pos[0] }}" {% if employee and employee.position_id == pos[0] %}selected{% endif %}>{{ pos[1] }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-3">
                    <label for="manager_id" class="form-label">Manager</label>
                    <select class="form-select" id="manager_id" name="manager_id">
                        <option value="">-- None --</option>
                        {% for mgr in managers %}
                            <option value="{{ mgr[0] }}" {% if employee and employee.manager_id == mgr[0] %}selected{% endif %}>{{ mgr[2] }}, {{ mgr[1] }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
        </div>
        <button type="submit" class="btn btn-success">{{ action }}</button>
        <a href="{{ url_for('employees.list') }}" class="btn btn-secondary">Cancel</a>
    </form>
{% endblock %}
