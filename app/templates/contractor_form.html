{% extends 'base.html' %}
{% block content %}
    <h1>{{ action }} Contractor</h1>
    <form method="post">
        <div class="row">
            <div class="col-md-6">
                {% if action == 'Add' %}
                <div class="mb-3">
                    <label for="person" class="form-label">Person</label>
                    <select class="form-select" id="person" name="person" required>
                        <option value="">-- Select a Person --</option>
                        {% for person in persons %}
                            <option value="{{ person[0] }}">{{ person[1] }} {{ person[2] }}</option>
                        {% endfor %}
                    </select>
                </div>
                {% else %}
                <div class="mb-3">
                    <label class="form-label">Person</label>
                    <p class="form-control-plaintext">{{ contractor.person_rel.last_name }}, {{ contractor.person_rel.first_name }}</p>
                </div>
                <div class="mb-3">
                    <label class="form-label">Personal Email</label>
                    <p class="form-control-plaintext">{{ contractor.person_rel.personal_email }}</p>
                </div>
                {% endif %}
                <div class="mb-3">
                    <label for="company_name" class="form-label">Company Name</label>
                    <input type="text" class="form-control" id="company_name" name="company_name" value="{{ contractor.company_name if contractor else '' }}">
                </div>
                <div class="mb-3">
                    <label for="start_date" class="form-label">Start Date</label>
                    <input type="date" class="form-control" id="start_date" name="start_date" required value="{{ contractor.start_date if contractor else '' }}">
                </div>
                <div class="mb-3">
                    <label for="end_date" class="form-label">End Date</label>
                    <input type="date" class="form-control" id="end_date" name="end_date" value="{{ contractor.end_date if contractor else '' }}">
                </div>
            </div>
            <div class="col-md-6">
                <div class="mb-3">
                    <label for="department_id" class="form-label">Department</label>
                    <select class="form-select" id="department_id" name="department_id">
                        <option value="">-- None --</option>
                        {% for dept in departments %}
                            <option value="{{ dept[0] }}" {% if contractor and contractor.department_id == dept[0] %}selected{% endif %}>{{ dept[1] }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-3">
                    <label for="manager_id" class="form-label">Manager</label>
                    <select class="form-select" id="manager_id" name="manager_id">
                        <option value="">-- None --</option>
                        {% for mgr in managers %}
                            <option value="{{ mgr[0] }}" {% if contractor and contractor.manager_id == mgr[0] %}selected{% endif %}>{{ mgr[2] }}, {{ mgr[1] }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
        </div>
        <button type="submit" class="btn btn-success">{{ action }}</button>
        <a href="{{ url_for('contractors.list') }}" class="btn btn-secondary">Cancel</a>
    </form>
{% endblock %}
